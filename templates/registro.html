<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart HelpDesk – Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a; --surface: #131929; --surface2: #1c2539;
      --border: #2a3655; --accent: #4f8ef7; --text: #e8edf8;
      --muted: #7a8ab0; --danger: #f87171; --success: #6ee7b7; --warn: #fbbf24;
    }
    body {
      font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(79,142,247,.05) 1px,transparent 1px),
                        linear-gradient(90deg,rgba(79,142,247,.05) 1px,transparent 1px);
      background-size: 40px 40px; z-index: 0;
    }
    .card {
      position: relative; z-index: 1; background: var(--surface);
      border: 1px solid var(--border); border-radius: 20px; padding: 48px 44px;
      width: 100%; max-width: 480px;
      box-shadow: 0 0 60px rgba(79,142,247,.08), 0 24px 48px rgba(0,0,0,.5);
      animation: slideUp .5s ease both;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); }
    }
    .logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
    .logo-icon { width:44px; height:44px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; }
    .logo h1 { font-size:1.25rem; font-weight:700; }
    .logo span { display:block; font-size:.72rem; color:var(--muted); font-weight:300; }
    h2 { font-size:1.5rem; font-weight:700; margin-bottom:6px; }
    .subtitle { color:var(--muted); font-size:.88rem; margin-bottom:28px; }
    .field { margin-bottom:18px; }
    label { display:block; font-size:.82rem; font-weight:600; color:var(--muted); margin-bottom:7px; letter-spacing:.04em; text-transform:uppercase; }
    input, select {
      width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px;
      padding:13px 16px; color:var(--text); font-family:'Sora',sans-serif; font-size:.94rem;
      transition:border-color .2s,box-shadow .2s; outline:none;
    }
    select option { background: var(--surface2); }
    input:focus, select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,142,247,.15); }
    .btn { width:100%; background:linear-gradient(135deg,var(--accent),#7c3aed); color:#fff; border:none; border-radius:10px; padding:14px; font-family:'Sora',sans-serif; font-size:1rem; font-weight:600; cursor:pointer; margin-top:8px; transition:opacity .2s; }
    .btn:hover { opacity:.9; }
    .link-back { text-align:center; font-size:.88rem; color:var(--muted); margin-top:20px; }
    .link-back a { color:var(--accent); text-decoration:none; font-weight:600; }
    .alert { padding:12px 16px; border-radius:8px; font-size:.88rem; margin-bottom:20px; }
    .alert-danger  { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.3); color:var(--danger); }
    .alert-success { background:rgba(110,231,183,.1); border:1px solid rgba(110,231,183,.3); color:var(--success); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <div><h1>Smart HelpDesk</h1><span>Crear nueva cuenta</span></div>
  </div>
  <h2>Registro de empleado</h2>
  <p class="subtitle">Crea tu cuenta para reportar incidentes</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="field">
      <label>Nombre completo</label>
      <input type="text" name="nombre" placeholder="Juan Pérez" required>
    </div>
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" name="email" placeholder="tu@empresa.com" required>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="Mínimo 6 caracteres" minlength="6" required>
    </div>
    <div class="field">
      <label>Departamento</label>
      <select name="departamento_id" required>
        <option value="">-- Selecciona tu área --</option>
        {% for d in departamentos %}
          <option value="{{ d.id }}">{{ d.nombre_dep }}</option>
        {% endfor %}
      </select>
    </div>
    <button class="btn" type="submit">Crear cuenta →</button>
  </form>
  <p class="link-back"><a href="/login">← Ya tengo cuenta</a></p>
</div>
</body>
</html>
