<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart HelpDesk – Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --surface: #131929;
      --surface2: #1c2539;
      --border: #2a3655;
      --accent: #4f8ef7;
      --accent2: #6ee7b7;
      --text: #e8edf8;
      --muted: #7a8ab0;
      --danger: #f87171;
      --success: #6ee7b7;
      --warn: #fbbf24;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,.05) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* Glowing orbs */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(79,142,247,.12) 0%, transparent 70%);
      top: -200px; right: -200px;
      z-index: 0;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: .7; }
    }

    .card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%; max-width: 440px;
      box-shadow: 0 0 60px rgba(79,142,247,.08), 0 24px 48px rgba(0,0,0,.5);
      animation: slideUp .5s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .logo h1 { font-size: 1.25rem; font-weight: 700; }
    .logo span { display: block; font-size: .72rem; color: var(--muted); font-weight: 300; }

    h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: .88rem; margin-bottom: 32px; }

    .field { margin-bottom: 20px; }
    label { display: block; font-size: .82rem; font-weight: 600; color: var(--muted); margin-bottom: 8px; letter-spacing: .04em; text-transform: uppercase; }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: .94rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,.15);
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .1s;
    }

    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.98); }

    .divider {
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      margin: 20px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute; top: 50%;
      width: 38%; height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .link-register {
      text-align: center;
      font-size: .88rem;
      color: var(--muted);
    }

    .link-register a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: .88rem;
      margin-bottom: 20px;
    }
    .alert-danger  { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--danger); }
    .alert-success { background: rgba(110,231,183,.1); border: 1px solid rgba(110,231,183,.3); color: var(--success); }
    .alert-warning { background: rgba(251,191,36,.1);  border: 1px solid rgba(251,191,36,.3);  color: var(--warn); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <div>
      <h1>Smart HelpDesk</h1>
      <span>Sistema de soporte técnico</span>
    </div>
  </div>

  <h2>Bienvenido</h2>
  <p class="subtitle">Ingresa tus credenciales para continuar</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" name="email" placeholder="tu@empresa.com" required>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button class="btn" type="submit">Iniciar sesión →</button>
  </form>

  <div class="divider">¿Nuevo en el sistema?</div>
  <p class="link-register"><a href="/registro">Crear una cuenta de empleado</a></p>
</div>
</body>
</html>
